<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Читалка</title>
  <style>
    /* Сброс стилей */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: #101010;
      color: white;
      overflow-x: hidden;
    }

    /* Шапка */
    .header {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Фон видео */
    .header video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Контейнер карусели */
    .carousel {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    /* Обложки книг */
    .carousel-item {
      position: relative;
      width: 250px;
      height: 400px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease, filter 0.3s ease;
      margin-bottom: 20px;
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.7); /* Затемнение в обычном состоянии */
      transition: filter 0.3s ease;
    }

    .carousel-item:hover img {
      filter: brightness(1); /* Убираем затемнение при наведении */
    }

    .carousel-item:hover {
      transform: scale(1.1); /* Увеличение при наведении */
    }

    /* Контейнер кнопок справа */
    .sidebar-buttons {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 20;
    }

    .sidebar-button {
      width: 200px;
      padding: 10px;
      text-align: center;
      background: #333;
      color: white;
      border: 1px solid white;
      border-radius: 25px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.3s ease, background-color 0.3s ease, color 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .sidebar-button:hover {
      transform: scale(1.05); /* Увеличение при наведении */
      background-color: white; /* Белый фон при наведении */
      color: #222; /* Черный текст при наведении */
    }

    /* Текст под каруселью */
    .header-text {
      text-align: center;
      margin-top: 20px;
    }

    .header-text h1 {
      font-size: 2rem;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .header-text p {
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <!-- Заставка с видео -->
    <video autoplay loop muted id="background-video">
      <source src="your-starry-sky-video.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <div class="carousel">
      <div class="carousel-item" onclick="window.location.href='book.html';">
        <img src="path-to-your-book1-cover.jpg" alt="Затмить Небеса">
      </div>
      <div class="carousel-item" onclick="window.location.href='#book2';">
        <img src="path-to-your-book2-cover.jpg" alt="Приди Меч!">
      </div>
      <div class="carousel-item" onclick="window.location.href='#other';">
        <img src="path-to-your-book3-cover.jpg" alt="Разное">
      </div>
    </div>

    <div class="header-text">
      <h1>Добро пожаловать в Читалку</h1>
      <p>Выберите книгу, чтобы начать чтение</p>
    </div>
  </div>

  <!-- Боковые кнопки -->
  <div class="sidebar-buttons">
    <a href="https://boosty.to/komataguri" target="_blank" class="sidebar-button">Boosty</a>
    <a href="https://tl.rulate.ru/users/209811" target="_blank" class="sidebar-button">Rulate</a>
    <a href="https://t.me/micro_koma" target="_blank" class="sidebar-button">Telegram</a>
    <a href="https://imgur.com/a/shrouding-heavens-Spr1aNB" target="_blank" class="sidebar-button">Галерея</a>
  </div>
</body>
</html>
