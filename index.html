<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Читалка</title>
  <style>
    /* Сброс стилей */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: #101010;
      color: white;
      overflow-x: hidden;
    }

    /* Шапка */
    .header {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 20px; /* Отступы от краев экрана */
    }

    /* Фон видео */
    .header video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Контейнер карусели */
    .carousel {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    /* Обложки книг */
    .carousel-item {
      position: relative;
      width: 250px;
      height: 400px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.7);
      transition: filter 0.3s ease;
    }

    .carousel-item:hover img {
      filter: brightness(1);
    }

    .carousel-item:hover {
      transform: scale(1.1);
    }

    /* Текст под каруселью */
    .header-text {
      text-align: center;
      margin-top: calc(1em + 10px); /* Расстояние в ширину шрифта надписи */
    }

    .header-text p {
      font-size: 1.2rem;
    }

    /* Контейнер кнопок соцсетей */
    .sidebar-buttons {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }

    .sidebar-button {
      width: 200px;
      padding: 10px;
      text-align: center;
      background: #333;
      color: white;
      border: 1px solid white;
      border-radius: 25px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.3s ease, background-color 0.3s ease, color 0.3s ease;
    }

    .sidebar-button:hover {
      transform: scale(1.05);
      background-color: white;
      color: #222;
    }

    /* Мобильная версия */
    @media (max-width: 768px) {
      .carousel {
        flex-direction: column;
        gap: 30px;
      }

      .carousel-item {
        width: 90%;
        height: auto;
      }

      .carousel-item img {
        height: auto;
      }

      .header {
        height: auto;
        padding: 20px 10px;
      }

      .sidebar-buttons {
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
      }

      .sidebar-button {
        width: 100px; /* Кнопки в два раза короче */
        padding: 8px;
      }

      .header-text {
        margin-top: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <!-- Заставка с видео -->
    <video autoplay loop muted id="background-video">
      <source src="your-starry-sky-video.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <div class="carousel">
      <div class="carousel-item" onclick="window.location.href='book.html';">
        <img src="path-to-your-book1-cover.jpg" alt="Затмить Небеса">
      </div>
      <div class="carousel-item" onclick="window.location.href='#book2';">
        <img src="path-to-your-book2-cover.jpg" alt="Приди Меч!">
      </div>
      <div class="carousel-item" onclick="window.location.href='#other';">
        <img src="path-to-your-book3-cover.jpg" alt="Разное">
      </div>
    </div>

    <div class="header-text">
      <p>Выберите книгу, чтобы начать чтение</p>
    </div>

    <!-- Кнопки соцсетей -->
    <div class="sidebar-buttons">
      <a href="https://boosty.to/komataguri" target="_blank" class="sidebar-button">Boosty</a>
      <a href="https://tl.rulate.ru/users/209811" target="_blank" class="sidebar-button">Rulate</a>
      <a href="https://t.me/micro_koma" target="_blank" class="sidebar-button">Telegram</a>
      <a href="https://imgur.com/a/shrouding-heavens-Spr1aNB" target="_blank" class="sidebar-button">Галерея</a>
    </div>
  </div>
</body>
</html>
