<div id="chapter-content"></div>
<script>
  // Получаем номер главы из URL
  const urlParams = new URLSearchParams(window.location.search);
  const chapterIndex = parseInt(urlParams.get('chapter')) || 0;

  // Загружаем JSON
  fetch('chapters.json')
    .then(response => response.json())
    .then(data => {
      // Загружаем содержимое текущей главы
      const chapter = data[chapterIndex];
      document.title = chapter.title; // Устанавливаем заголовок страницы
      const contentContainer = document.getElementById('chapter-content');

      // Добавляем параграфы главы
      chapter.content.forEach(paragraph => {
        const p = document.createElement('p');
        p.textContent = paragraph;
        contentContainer.appendChild(p);
      });
    })
    .catch(error => console.error('Ошибка загрузки JSON:', error));
</script>
